<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি ইউটিউব ডাউনলোডার</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-500 mb-2">🎬 YT Downloader</h1>
            <p class="text-gray-400">কোনো সাইন-আপ ছাড়াই সরাসরি গ্যালারিতে ডাউনলোড করুন</p>
            
            <div class="mt-4 p-3 bg-gray-800 rounded-lg inline-block border border-gray-700">
                <span class="text-green-400 font-semibold" id="count-display">মোট ডাউনলোড: ০ টি</span>
            </div>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-6">
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="video-url" placeholder="ইউটিউব ভিডিওর লিংক এখানে পেস্ট করুন..." 
                       class="flex-1 px-4 py-3 bg-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 border border-gray-600">
                <button onclick="fetchVideoInfo()" id="fetch-btn" 
                        class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-3 rounded-lg transition duration-200">
                    লিংক খুঁজুন
                </button>
            </div>
            <p id="error-msg" class="text-red-400 text-sm mt-3 hidden"></p>
        </div>

        <div id="loader" class="text-center py-6 hidden">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-red-500 rounded-full"></div>
            <p class="text-gray-400 mt-2">ভিডিওর তথ্য এবং ডাউনলোড লিংক খোঁজা হচ্ছে...</p>
        </div>

        <div id="result-box" class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-6 hidden">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <img id="thumb-img" src="" alt="Thumbnail" class="w-full md:w-48 rounded-lg object-cover">
                <div class="flex-1">
                    <h3 id="video-title" class="font-bold text-lg mb-2 text-white line-clamp-2"></h3>
                    <a id="thumb-download-btn" href="#" target="_blank" onclick="increaseCount()"
                       class="inline-block text-xs bg-blue-600 hover:bg-blue-700 text-white font-semibold py-1.5 px-3 rounded transition">
                        🖼️ ডাউনলোড থাম্বনেইল
                    </a>
                </div>
            </div>

            <h4 class="font-semibold text-gray-300 mb-3 border-b border-gray-700 pb-2">ডাউনলোড অপশনসমূহ:</h4>
            <div id="formats-list" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            updateCountDisplay();
        });

        async function fetchVideoInfo() {
            const urlInput = document.getElementById('video-url').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-box');
            
            errorMsg.classList.add('hidden');
            resultBox.classList.add('hidden');
            
            if(!urlInput) {
                errorMsg.innerText = "দয়া করে একটি লিংক দিন!";
                errorMsg.classList.remove('hidden');
                return;
            }

            loader.classList.remove('hidden');

            try {
                const response = await fetch('/fetch-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await response.json();
                loader.classList.add('hidden');

                if(data.error) {
                    errorMsg.innerText = data.error;
                    errorMsg.classList.remove('hidden');
                } else {
                    document.getElementById('video-title').innerText = data.title;
                    document.getElementById('thumb-img').src = data.thumbnail;
                    document.getElementById('thumb-download-btn').href = `/download-thumbnail?url=${encodeURIComponent(data.thumbnail)}`;

                    const formatsList = document.getElementById('formats-list');
                    formatsList.innerHTML = ''; 

                    data.formats.forEach(f => {
                        const row = document.createElement('div');
                        row.className = "flex justify-between items-center bg-gray-700 p-3 rounded-lg hover:bg-gray-600 transition";
                        row.innerHTML = `
                            <div>
                                <span class="font-medium text-white">${f.resolution}</span>
                                <span class="text-xs bg-gray-600 px-2 py-0.5 rounded text-gray-300 ml-2">${f.ext}</span>
                            </div>
                            <a href="${f.download_url}" target="_blank" onclick="increaseCount()"
                               class="bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-4 py-2 rounded-lg transition duration-150">
                                ↓ ডাউনলোড
                            </a>
                        `;
                        formatsList.appendChild(row);
                    });

                    resultBox.classList.remove('hidden');
                }
            } catch (err) {
                loader.classList.add('hidden');
                errorMsg.innerText = "সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না।";
                errorMsg.classList.remove('hidden');
            }
        }

        function increaseCount() {
            let count = localStorage.getItem('download_count') || 0;
            count = parseInt(count) + 1;
            localStorage.setItem('download_count', count);
            updateCountDisplay();
        }

        function updateCountDisplay() {
            const count = localStorage.getItem('download_count') || 0;
            document.getElementById('count-display').innerText = `মোট ডাউনলোড: ${count} টি`;
        }
    </script>
</body>
</html>
